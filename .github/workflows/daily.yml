name: Daily price check

on:
  schedule:
    # 04:15 UTC = 07:15 Israel (IDT, UTC+3)
    - cron: "15 4 * * *"
  workflow_dispatch:

concurrency:
  group: daily-price-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Restore price history
        uses: actions/cache@v4
        with:
          path: logs/price_history.json
          key: price-history-v1

      - name: Prepare logs directory
        run: mkdir -p logs

      - name: Write config.json
        env:
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
        run: |
          if [ -z "$CONFIG_JSON" ]; then
            echo "Missing CONFIG_JSON secret. Add your config.json contents as a repository secret."
            exit 1
          fi
          printf '%s' "$CONFIG_JSON" > config.json

      - name: Restore Arbitrip browser session
        env:
          ARBITRIP_STORAGE_STATE_B64: ${{ secrets.ARBITRIP_STORAGE_STATE_B64 }}
        run: |
          if [ -n "$ARBITRIP_STORAGE_STATE_B64" ]; then
            echo "$ARBITRIP_STORAGE_STATE_B64" | base64 -d > logs/arbitrip_storage.json
            echo "Arbitrip session restored ($(wc -c < logs/arbitrip_storage.json) bytes)"
          else
            echo "No ARBITRIP_STORAGE_STATE_B64 secret — Arbitrip hotels will fail until session is configured."
          fi

      - name: Run price check
        env:
          STAYAPI_API_KEY: ${{ secrets.STAYAPI_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ARBITRIP_STORAGE_STATE: logs/arbitrip_storage.json
          ARBITRIP_SEARCH_TOKEN: ${{ secrets.ARBITRIP_SEARCH_TOKEN }}
        run: python run_api.py

      - name: Upload run log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: run-logs
          path: logs/
          if-no-files-found: ignore
